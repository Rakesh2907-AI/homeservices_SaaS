# Per-tenant namespace template. Substituted via envsubst or Helm.
# Each business gets:
#   1. Logical isolation (Namespace)
#   2. Resource quotas (prevents noisy neighbors)
#   3. Default-deny network policy (blocks lateral movement)
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-${TENANT_SLUG}
  labels:
    tenant-id: "${TENANT_ID}"
    plan-tier: "${PLAN_TIER}"
    managed-by: terraform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: tenant-${TENANT_SLUG}
spec:
  hard:
    requests.cpu: "${CPU_REQUEST}"
    requests.memory: "${MEMORY_REQUEST}"
    limits.cpu: "${CPU_LIMIT}"
    limits.memory: "${MEMORY_LIMIT}"
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: tenant-${TENANT_SLUG}
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tenant-${TENANT_SLUG}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: tenant-${TENANT_SLUG}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              role: api-gateway
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-shared
  namespace: tenant-${TENANT_SLUG}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    # DB and Redis live in `shared-infra` namespace
    - to:
        - namespaceSelector:
            matchLabels:
              role: shared-infra
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

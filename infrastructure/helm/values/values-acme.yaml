# Per-tenant override for "Acme Plumbing".
# Demonstrates: targeted image tag, custom resource caps, custom domain.
tenant:
  id: "00000000-0000-0000-0000-000000000000"   # replace with real UUID
  slug: acme
  planTier: pro

image:
  tag: "1.0.3-acme-hotfix"   # Acme runs a different version than the fleet.

services:
  apiGateway:
    replicaCount: 3
  bookingService:
    replicaCount: 5            # higher because Acme has heavier traffic
    resources:
      limits: { cpu: 2000m, memory: 2Gi }

autoscaling:
  minReplicas: 3
  maxReplicas: 20

ingress:
  enabled: true
  host: service.acmeplumbing.com
  tls:
    enabled: true

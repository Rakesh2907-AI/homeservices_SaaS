{{- $serviceMap := dict
  "api-gateway"     .Values.services.apiGateway
  "tenant-service"  .Values.services.tenantService
  "auth-service"    .Values.services.authService
  "booking-service" .Values.services.bookingService
}}

{{- range $name, $svc := $serviceMap }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "hs.namespace" $ }}
  labels:
    {{- include "hs.labels" $ | nindent 4 }}
    app: {{ $name }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        {{- include "hs.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ $.Values.image.registry }}/{{ $name }}:{{ $.Values.image.tag }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: PORT
              value: "{{ $svc.port }}"
            - name: NODE_ENV
              value: production
            - name: TENANT_ID
              value: {{ $.Values.tenant.id | quote }}
            - name: APP_BASE_DOMAIN
              value: {{ $.Values.ingress.host | quote }}
            - name: REDIS_URL
              value: redis://{{ $.Values.redis.host }}:{{ $.Values.redis.port }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.database.secretName }}
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hs-jwt-secret
                  key: secret
          livenessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /health, port: {{ $svc.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "hs.namespace" $ }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
{{- if $.Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ include "hs.namespace" $ }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $.Values.autoscaling.minReplicas }}
  maxReplicas: {{ $.Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $.Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
{{- end }}

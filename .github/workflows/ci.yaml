name: CI

on:
  push: { branches: [main] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password
          POSTGRES_DB: homeservices
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install --workspaces --include-workspace-root
      - run: npm --workspace shared run migrate:latest
      - run: npm test --workspaces --if-present

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, tenant-service, auth-service, booking-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          build-args: SERVICE=${{ matrix.service }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
